<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CALI</title>
  <script>
    // SPA redirect: GitHub Pages serves 404.html for unknown routes
    // This redirects back to index.html with the path preserved as a query param
    var path = window.location.pathname;
    window.location.replace(
      window.location.origin + '/CLAUD_CALI_DEV/?p=' + encodeURIComponent(path.replace('/CLAUD_CALI_DEV', ''))
    );
  </script>
</head>
<body></body>
</html>
